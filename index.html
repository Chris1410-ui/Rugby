<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#16142E" />
    <title>Rugby Performance Élite</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png?v=2" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Kill-switch ciblé : l'app n'utilise qu'UN service worker, `push-sw.js`
         (notifications push, sans cache). Tout AUTRE SW (obsolète, laissé par un
         ancien déploiement/outil) servirait de vieux assets hashés → chargement
         infini : on le désenregistre, on vide les caches, puis on recharge UNE
         fois. On ÉPARGNE explicitement push-sw.js pour ne pas casser les push. -->
    <script>
      (function () {
        try {
          if (!("serviceWorker" in navigator)) return;
          var isOurs = function (reg) {
            var s = (reg.active || reg.waiting || reg.installing);
            return s && s.scriptURL && s.scriptURL.indexOf("/push-sw.js") !== -1;
          };
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            var foreign = (regs || []).filter(function (r) { return !isOurs(r); });
            if (!foreign.length) return;
            Promise.all(foreign.map(function (r) { return r.unregister(); })).then(function () {
              if (window.caches && caches.keys) {
                caches.keys().then(function (keys) { keys.forEach(function (k) { caches.delete(k); }); });
              }
              if (!sessionStorage.getItem("sw-killed")) {
                sessionStorage.setItem("sw-killed", "1");
                location.reload();
              }
            });
          }).catch(function () {});
        } catch (e) { /* noop */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Sentinelle de démarrage (ES5 pur — doit tourner PARTOUT, même là où le
         bundle moderne ne parse pas). Si React n'a pas monté (window.__appMounted)
         après le délai, ou si une erreur JS précoce est capturée, on affiche un
         écran d'erreur LISIBLE (message + navigateur + bouton recharger) au lieu
         d'une page bleue vide et muette. -->
    <script>
      (function () {
        var errs = [];
        window.addEventListener("error", function (e) {
          if (!window.__appMounted) {
            errs.push((e && e.message) || "Erreur script");
            setTimeout(check, 1500); // erreur précoce → vérifie vite
          }
        }, true);
        window.addEventListener("unhandledrejection", function (e) {
          if (!window.__appMounted) {
            var r = e && e.reason;
            errs.push("Promesse rejetée : " + ((r && (r.message || r)) || "inconnue"));
          }
        });
        function check() {
          if (window.__appMounted) return;
          var root = document.getElementById("root");
          if (!root || (root.childNodes && root.childNodes.length > 0)) return;
          var detail = errs.length
            ? errs.slice(0, 3).join("\n")
            : "Aucune erreur capturée — navigateur probablement trop ancien pour charger l'application.";
          root.innerHTML =
            '<div style="min-height:100vh;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;padding:24px;color:#fff;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;">' +
            '<div style="max-width:420px;text-align:center;line-height:1.6;">' +
            '<div style="font-size:16px;font-weight:800;color:#E8553B;margin-bottom:8px;">L’application n’a pas pu démarrer</div>' +
            '<div style="font-size:12px;color:rgba(255,255,255,0.65);white-space:pre-wrap;word-break:break-word;margin-bottom:6px;">' +
            String(detail).replace(/&/g, "&amp;").replace(/</g, "&lt;") + "</div>" +
            '<div style="font-size:10px;color:rgba(255,255,255,0.35);word-break:break-word;margin-bottom:14px;">' +
            String(navigator.userAgent).replace(/&/g, "&amp;").replace(/</g, "&lt;") + "</div>" +
            '<button onclick="location.reload()" style="background:#E8553B;border:none;border-radius:10px;padding:11px 16px;color:#fff;font-weight:800;font-size:13px;cursor:pointer;">Recharger</button>' +
            "</div></div>";
        }
        setTimeout(check, 9000); // filet : rien n'a monté du tout
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
