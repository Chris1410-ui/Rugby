name: CI

# Vérifie chaque PR et chaque push sur main : lint + tests (dont garde-fou i18n)
# + build de production + audit des dépendances de PROD (dev exclu : vite/vitest
# portent des advisories transitoires non expédiées).
on:
  push:
    branches: [main]
  pull_request:

# Annule les runs obsolètes d'une même branche/PR (économie + feedback plus rapide).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 22+ requis : @supabase/realtime-js utilise le WebSocket global
          # (absent en Node 20), sollicité au chargement de src/lib/supabase.js.
          node-version: 22
          cache: npm

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests (vitest + parité i18n)
        run: npm run test

      - name: Build (production)
        run: npm run build

      - name: Audit dépendances de production
        run: npm audit --omit=dev --audit-level=high
